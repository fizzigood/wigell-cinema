spring.application.name=wigell-cinema
server.port=8583

# MySQL Database
spring.datasource.url=jdbc:mysql://localhost:3306/wigell_cinema_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=Root123
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Error handling
server.error.include-message=always
server.error.include-binding-errors=always

# Keycloak OAuth2 Resource Server
spring.security.oauth2.resourceserver.jwt.issuer-uri=http://localhost:8090/realms/wigell-realm
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=http://localhost:8090/realms/wigell-realm/protocol/openid-connect/certs

# Registrerar wigell-cinema hos Spring Boot Admin Dashboard
spring.boot.admin.client.url=http://localhost:9090
spring.boot.admin.client.instance.management-base-url=http://localhost:8583
spring.boot.admin.client.username=admin
spring.boot.admin.client.password=admin

# Currency Converter Microservice
currency-service.url=http://localhost:8586

# Actuator
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always
management.info.env.enabled=true
info.app.name=Wigell Cinema
info.app.description=Cinema booking and ticket management system
info.app.version=1.0.0

